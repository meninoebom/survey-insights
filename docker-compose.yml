services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: survey
      POSTGRES_PASSWORD: survey
      POSTGRES_DB: survey
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U survey -d survey"]
      interval: 3s
      timeout: 3s
      retries: 10

  app:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://survey:survey@db:5432/survey
      # SOURCE_DIR is a writable, persistent directory (the named volume below).
      # It is seeded from BUNDLED_SAMPLE on first boot; each upload is saved here
      # as a timestamped CSV and the newest wins. The volume stands in for object
      # storage (the LocalDirectorySource); production swaps in S3.
      SOURCE_DIR: /data
      BUNDLED_SAMPLE: /app/us_ai_survey_unique_50.csv
      MIN_RELIABLE_N: "30"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      # Persistent, writable source directory: uploads survive restarts here.
      - survey_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status==200 else 1)"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  # The persistent source directory. `docker compose down -v` discards it (and the
  # seeded sample re-seeds on the next boot); a plain restart keeps uploads.
  survey_data:
