# Commit-time formatting + lint autofix only, so the hook stays fast and reliable.
# Type checking (mypy) runs via `mise run check`, deliberately not in this hook.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format
