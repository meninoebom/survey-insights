<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Survey Insights</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Franklin:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{font-family:'Libre Franklin',sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
  #root{height:100%;}
  .tnum{font-variant-numeric:tabular-nums lining-nums;font-feature-settings:"tnum" 1,"lnum" 1;}
  .rail-scroll::-webkit-scrollbar,.canvas-scroll::-webkit-scrollbar{width:9px;height:9px;}
  .rail-scroll::-webkit-scrollbar-thumb,.canvas-scroll::-webkit-scrollbar-thumb{background:#dad6cd;border-radius:6px;}
  .rail-scroll::-webkit-scrollbar-track,.canvas-scroll::-webkit-scrollbar-track{background:transparent;}
  ::selection{background:#cfe0f2;}
  /* One focus rule covers every button: a visible ring for keyboard users only. */
  :focus-visible{outline:2px solid #1B5E96;outline-offset:2px;border-radius:6px;}
  :focus:not(:focus-visible){outline:none;}
  /* Respect a reduced-motion preference: no transitions, no animations, no blur. */
  @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important;}}
  .visually-hidden{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0 0 0 0);white-space:nowrap;border:0;}
  /* The drop-overlay blur lives here (not inline) so reduced-motion can drop it. */
  .drop-overlay{backdrop-filter:blur(1.5px);}
  @media (prefers-reduced-motion: reduce){.drop-overlay{backdrop-filter:none;}}
  /* Below ~900px the header wraps; drop the measure chip first (it is duplicated
     in the page title and the rail), so the action buttons keep their room. */
  @media (max-width: 900px){.hide-when-tight{display:none!important;}}
</style>
</head>
<body>
<div id="root"></div>
<!-- React via CDN, no build step (the one runtime dependency; needs network on first load). -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="./meta.js"></script>
<script src="./app.js"></script>
</body>
</html>
